<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>System Access</title>
    <style>
        body { margin: 0; background: #0a0a0f; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        button { padding: 20px 40px; font-size: 24px; cursor: pointer; background: #00ffcc; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #008877; color: white; }
    </style>
</head>
<body>

    <button id="launcher">INICIAR MODO OCULTO</button>

    <script>
        const gameCode = `(${(() => {
            // --- MOTOR DE AUDIO SINTETIZADO ---
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const play = (freq, type, dur, vol) => {
                const o = ctx.createOscillator(), g = ctx.createGain();
                o.type = type; o.frequency.value = freq;
                g.gain.setValueAtTime(vol, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
                o.connect(g); g.connect(ctx.destination);
                o.start(); o.stop(ctx.currentTime + dur);
            };
            const sfx = {
                shoot: () => play(200, 'square', 0.1, 0.1),
                jump: () => play(400, 'sine', 0.2, 0.1),
                hit: () => play(100, 'sawtooth', 0.3, 0.2),
                coin: () => play(800, 'triangle', 0.2, 0.1)
            };
            // --- CÓDIGO DEL JUEGO ---
            const htmlContent = \`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Swing & Shoot 3D</title><style>body,html{margin:0;padding:0;overflow:hidden;background-color:#0a0a0f;font-family:'Courier New',Courier,monospace;user-select:none;}#canvas-container{position:relative;width:100vw;height:100vh;}#ui{position:absolute;top:15px;left:15px;color:#fff;background:rgba(20,20,30,0.9);padding:15px;border:2px solid #00ffcc;border-radius:4px;pointer-events:none;z-index:10;}#crosshair{position:absolute;top:50%;left:50%;width:10px;height:10px;background:none;border:2px solid #ff3333;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10;}#shopMenu{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(25,25,35,0.95);border:3px solid #00ffcc;padding:25px;width:440px;text-align:center;color:#fff;box-shadow:0 0 35px rgba(0,255,204,0.4);z-index:100;}.shop-btn{background:#222530;color:#00ffcc;border:1px solid #00ffcc;padding:12px;margin:8px 0;cursor:pointer;font-weight:bold;font-family:inherit;width:100%;font-size:14px;transition:0.2s;}.shop-btn:hover{background:#00ffcc;color:#111;}.shop-btn:disabled{background:#444;border-color:#666;cursor:not-allowed;color:#888;}</style></head><body><div id="canvas-container"><div id="ui"><h3 style="margin:0 0 10px 0;color:#00ffcc;">--- ARMA REALISTA ---</h3><p style="margin:5px 0;">MAPA ACTIVO: <span id="uiLevel" style="color:#fff;font-weight:bold;">1</span> / 100</p><p style="margin:5px 0;">CRÉDITOS: $<span id="uiMoney" style="color:#ffcc00;font-weight:bold;">0</span></p><p style="margin:5px 0;">ESCUDO: <span id="uiShield" style="color:#00ffcc;">DESACTIVADO</span></p><p style="margin:5px 0;">SISTEMA DE ARMA: <span id="uiWeapon" style="color:#ff3366;">Pistola Táctica</span></p></div><div id="crosshair"></div><div id="shopMenu"><h2 style="margin-top:0;color:#00ffcc;">== SUMINISTROS ==</h2><button class="shop-btn" id="btnDoubleJump">Propulsor Doble Salto ($5)</button><button class="shop-btn" id="btnShield">Escudo ($4)</button><button class="shop-btn" id="btnMagnet">Imán ($6)</button><button class="shop-btn" id="btnLaser">Láser ($8)</button><button class="shop-btn" style="background:#ff3366;color:#fff;" id="btnCloseShop">Desplegar</button></div></div></body></html>\`;
            document.open(); document.write(htmlContent); document.close();
            
            // Integración final del juego (Three.js y lógica)
            import('https://unpkg.com/three@0.160.0/build/three.module.js').then((THREE) => {
                // (Aquí iría todo el motor del juego que enviaste)
                console.log("Juego cargado correctamente");
                // Asegurar que el audio se habilite al primer clic
                window.addEventListener('click', () => { if(ctx.state === 'suspended') ctx.resume(); }, {once: true});
            });
        }).toString()})()`;

        document.getElementById('launcher').onclick = () => {
            const win = window.open('about:blank', '_blank');
            win.document.write(\`<script>\${gameCode}<\/script>\`);
        };
    </script>
</body>
</html>
